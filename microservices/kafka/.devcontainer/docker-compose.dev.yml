services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
    command: sleep infinity
    environment:
      CGO_ENABLED: "1"
      KAFKA_BROKER: "kafka:29092"
      ZOOKEEPER: "zookeeper:2181"
      KAFDROPUI: "kafdropui:9090"
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network
